[[ClassifierRules]]
EnumerationScope = "ContentsEnumeration"
RuleName = "KeepPassOrKeyInCode"
MatchAction = "Snaffle"
Description = "Files with contents matching these regexen are very interesting."
MatchLocation = "FileContentAsString"
WordListType = "Regex"
MatchLength = 0
WordList = ["passw?o?r?d\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"api[Kk]ey\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"passw?o?r?d?>\\s*[^\\s<]+\\s*<",
"passw?o?r?d?>.{3,2000}</pass",
"[\\s]+-passw?o?r?d?",
"api[kK]ey>\\s*[^\\s<]+\\s*<",
"[_\\-\\.]oauth\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"client_secret\\s*=*\\s*",
"<ExtendedMatchKey>ClientAuth",
"GIUserPassword",
"[Aa][Dd][Pp]ass(?:word)?\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"[Aa][Dd][Uu]ser(?:name)?\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"[Dd]omain[Pp]ass(?:word)?\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"[Dd]omain[Uu]ser(?:name)?\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"[Dd]omain[Aa]dmin\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
"[Jj]oin[Dd]omain\\s*=\\s*[\\'\\\"][^\\'\\\"]....",
]
Triage = "Red"
